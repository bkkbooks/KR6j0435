body:
  text: 金剛智三藏為此具最上利根人現身也或為繫持念行者必可現形是為大日如來因位三毒煩惱行相而已爾時大日如來金剛忿怒力士諸天等為我行者現忿怒龍王身畏彼之三毒煩惱永離三途輪迴苦業此故可說我祕密呪真言曰次俱力迦羅龍王現身印真言二手作忿怒奉舉二肩真言曰次俱迦龍王不動明王真言印二手金剛合掌二火二空開散二小指入掌中真言心中心印內縛二水二火開散心中心真言曰不動如來大日如來龍王現身根本真言誦此真言必現身往生十方淨土若拜尊容至阿耨菩提終不墮三惡趣此龍王火光三昧神通也火天者此彼四智所語故火天聖者火光三昧赫奕光明皆此火天身能可念此龍王不思議神力只有此法觀本生法變大日成不動變不動成劍之上相字返成龍王左右無名小指掌內相叉二中指直立相跓以二食指跓中指背上節以二大指小曲各柱二食指內中節來去曩莫三滿多勃馱南俱里迦耶迦羅惹銘伽扇儞曳娑婆訶次俱力迦羅龍王密修真言印內縛二中指二大指開散此密印也次俱力迦羅變身印真言大日如來也二手合掌二風二空端相著二水開立真言曰次金剛體身真言印唵唅吽嚩日囉麼曳縛日羅次海三昧印真言唵縛曰赦次常住火光三昧印真言曰唵拔折羅赦悍若行者恒繫此俱力迦龍王念自然成護摩火光三昧四臂明王皆此龍王用力常布行人身上阿字有其中劍遍含五字遍體成無動尊金剛身如是觀已誦一字真言那莫三曼多嚩日羅赦憾次金迦羅印真言釋迦此也印二手金剛合掌二中指二大指入掌中即成真言唵金迦羅那嚩日羅次誓陀迦印真言二手內縛二地二風開散小曲相成唵嚩日囉赦吽栖陀迦野娑婆賀次蓮花吉祥印真言觀音是也部主二羽合掌二水二風內相叉曩莫三曼多縛日羅赦吽吽憾曳陀羅野莎𭇎此四使者加不動成五使者大日如來五智成身此也
